<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J. Krishna Priya | AI Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Segoe UI',sans-serif;
background:#0a0a0f;
color:#fff;
scroll-behavior:smooth;
overflow-x:hidden;
}

/* Animated grid background */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#00f7ff22 1px,transparent 1px);
background-size:40px 40px;
animation:moveBg 20s linear infinite;
z-index:-1;
}
@keyframes moveBg{
0%{transform:translate(0,0);}
100%{transform:translate(-200px,-200px);}
}

/* Navbar */
nav{
position:fixed;
width:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
padding:15px;
text-align:center;
z-index:1000;
}
nav a{
color:#00f7ff;
margin:0 20px;
text-decoration:none;
font-weight:bold;
}
nav a:hover{text-shadow:0 0 10px #00f7ff;}

/* Header */
header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.profile-container{
position:relative;
margin-bottom:20px;
}

.profile-container img{
width:170px;
height:170px;
border-radius:50%;
object-fit:cover;
animation:float 4s ease-in-out infinite;
border:3px solid #00f7ff;
box-shadow:0 0 20px #00f7ff;
}

.profile-container::before{
content:"";
position:absolute;
top:-10px;left:-10px;
right:-10px;bottom:-10px;
border-radius:50%;
border:3px solid #00f7ff;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 10px #00f7ff;}
to{box-shadow:0 0 30px #00f7ff;}
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

header h1{font-size:2.5rem;}

.typing{
color:#00f7ff;
font-size:1.3rem;
margin-top:10px;
height:30px;
}

/* Sections */
section{
padding:100px 10%;
opacity:0;
transform:translateY(50px);
transition:1s;
}
section.show{
opacity:1;
transform:translateY(0);
}

h2{color:#00f7ff;margin-bottom:30px;}

.card{
background:#14141c;
padding:25px;
border-radius:15px;
margin-bottom:20px;
transition:0.4s;
}
.card:hover{
transform:translateY(-8px);
box-shadow:0 0 25px #00f7ff;
}

/* Skills */
.skill{margin-bottom:15px;}
.bar{
height:8px;
background:#222;
border-radius:10px;
overflow:hidden;
}
.bar div{
height:100%;
background:#00f7ff;
width:0;
transition:2s;
}

/* Buttons */
button{
padding:10px 20px;
border:none;
background:#00f7ff;
color:#000;
font-weight:bold;
border-radius:25px;
cursor:pointer;
margin-top:10px;
}
button:hover{box-shadow:0 0 20px #00f7ff;}

.social{margin-top:15px;}
.social a{
margin:0 10px;
color:#00f7ff;
font-size:1.5rem;
text-decoration:none;
transition:0.3s;
}
.social a:hover{text-shadow:0 0 15px #00f7ff;}

footer{
text-align:center;
padding:20px;
background:#0f0f15;
}
</style>
</head>

<body>

<nav>
<a href="#about">About</a>
<a href="#skills">Skills</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</nav>

<header>
<div class="profile-container">
<img src="profile.jpg" alt="J. Krishna Priya">
</div>

<h1>J. Krishna Priya</h1>
<div class="typing" id="typing"></div>

<div class="social">
<a href="https://github.com/Krishna141203" target="_blank">💻</a>
<a href="https://www.linkedin.com/in/krishna-priya-66384a341" target="_blank">🔗</a>
<a href="mailto:krishnapriya74929@gmail.com">📧</a>
</div>
</header>

<!-- Rest of your sections remain same -->

<script>
const text=["AI Engineer in Progress 🚀","Engineering Intelligence from Information 🤖","Analyzing Data. Extracting Insight ✨"];
let i=0,j=0,current="",isDeleting=false;
function type(){
current=text[i];
if(!isDeleting){
document.getElementById("typing").textContent=current.substring(0,j++);
if(j>current.length){isDeleting=true;setTimeout(type,1000);return;}
}else{
document.getElementById("typing").textContent=current.substring(0,j--);
if(j==0){isDeleting=false;i=(i+1)%text.length;}
}
setTimeout(type,80);
}
type();
</script>

</body>
</html>
